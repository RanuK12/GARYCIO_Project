<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARYCIO WhatsApp Bot - Simulador</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b141a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone-frame {
    width: 390px;
    height: 780px;
    background: #0b141a;
    border-radius: 40px;
    border: 3px solid #2a2a2a;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
  }

  /* Status bar */
  .status-bar {
    background: #1f2c34;
    padding: 8px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #aebac1;
  }

  /* WhatsApp header */
  .wa-header {
    background: #1f2c34;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #222d34;
  }

  .wa-header .back-arrow {
    color: #00a884;
    font-size: 20px;
    cursor: pointer;
  }

  .wa-header .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #00a884;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 16px;
  }

  .wa-header .contact-info {
    flex: 1;
  }

  .wa-header .contact-name {
    color: #e9edef;
    font-size: 16px;
    font-weight: 500;
  }

  .wa-header .contact-status {
    color: #8696a0;
    font-size: 12px;
  }

  .wa-header .header-icons {
    display: flex;
    gap: 20px;
    color: #aebac1;
    font-size: 18px;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    background: #0b141a;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23111b21' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: #374045; border-radius: 4px; }

  /* Messages */
  .message {
    max-width: 85%;
    padding: 6px 8px 2px;
    border-radius: 8px;
    font-size: 14.2px;
    line-height: 1.35;
    position: relative;
    margin-bottom: 2px;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .message .time {
    font-size: 11px;
    color: #8696a0;
    float: right;
    margin-left: 8px;
    margin-top: 4px;
  }

  .message.sent {
    background: #005c4b;
    color: #e9edef;
    align-self: flex-end;
    border-top-right-radius: 0;
  }

  .message.sent .time {
    color: rgba(255,255,255,0.55);
  }

  .message.sent .check {
    color: #53bdeb;
    font-size: 13px;
    margin-left: 2px;
  }

  .message.received {
    background: #1f2c34;
    color: #e9edef;
    align-self: flex-start;
    border-top-left-radius: 0;
  }

  /* Date separator */
  .date-separator {
    text-align: center;
    margin: 8px 0;
  }

  .date-separator span {
    background: #182229;
    color: #8696a0;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 8px;
  }

  /* Bold text in messages */
  .message b { font-weight: 600; }
  .message i { font-style: italic; }

  /* Input area */
  .input-area {
    background: #1f2c34;
    padding: 8px 10px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .input-area .emoji-btn {
    color: #8696a0;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
    padding-bottom: 6px;
  }

  .input-area .msg-input {
    flex: 1;
    background: #2a3942;
    border: none;
    border-radius: 8px;
    padding: 9px 12px;
    color: #e9edef;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    min-height: 38px;
  }

  .input-area .msg-input::placeholder { color: #8696a0; }

  .input-area .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #00a884;
    border: none;
    color: #111b21;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .input-area .send-btn:hover { background: #06cf9c; }

  /* Role selector */
  .role-selector {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #182229;
    border: 1px solid #2a3942;
    border-radius: 12px;
    padding: 20px;
    z-index: 10;
    width: 320px;
    text-align: center;
  }

  .role-selector h3 {
    color: #e9edef;
    margin-bottom: 16px;
    font-size: 16px;
  }

  .role-selector .role-btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    background: #2a3942;
    border: 1px solid #374045;
    border-radius: 8px;
    color: #e9edef;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }

  .role-selector .role-btn:hover { background: #005c4b; }
  .role-selector .role-btn .role-icon { margin-right: 8px; }

  /* Typing indicator */
  .typing-indicator {
    align-self: flex-start;
    background: #1f2c34;
    border-radius: 8px;
    border-top-left-radius: 0;
    padding: 10px 14px;
    display: none;
  }

  .typing-indicator span {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #8696a0;
    margin: 0 1px;
    animation: typing 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }

  /* Notification banner */
  .notification-banner {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #182229;
    border: 1px solid #005c4b;
    border-radius: 12px;
    padding: 12px 16px;
    max-width: 350px;
    color: #e9edef;
    font-size: 13px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: slideIn 0.3s ease;
    display: none;
  }

  .notification-banner .notif-title {
    color: #00a884;
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 12px;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Side panel - for role info */
  .side-info {
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: #182229;
    border: 1px solid #2a3942;
    border-radius: 12px;
    padding: 20px;
    width: 280px;
    color: #8696a0;
    font-size: 13px;
  }

  .side-info h4 {
    color: #00a884;
    margin-bottom: 12px;
    font-size: 14px;
  }

  .side-info .info-item {
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .side-info .info-label {
    color: #aebac1;
    font-weight: 500;
  }

  .side-info .reset-btn {
    margin-top: 16px;
    width: 100%;
    padding: 8px;
    background: #2a3942;
    border: 1px solid #374045;
    border-radius: 6px;
    color: #e9edef;
    cursor: pointer;
    font-size: 13px;
  }

  .side-info .reset-btn:hover { background: #374045; }

  @media (max-width: 900px) {
    .side-info { display: none; }
  }
</style>
</head>
<body>

<div class="side-info" id="sideInfo">
  <h4>GARYCIO Bot Simulator</h4>
  <div class="info-item"><span class="info-label">Rol:</span> <span id="infoRole">-</span></div>
  <div class="info-item"><span class="info-label">Flow:</span> <span id="infoFlow">-</span></div>
  <div class="info-item"><span class="info-label">Step:</span> <span id="infoStep">-</span></div>
  <div class="info-item"><span class="info-label">Teléfono:</span> <span id="infoPhone">-</span></div>
  <hr style="border-color:#2a3942;margin:12px 0">
  <div style="color:#8696a0;font-size:12px;line-height:1.5">
    Simulador local del bot de WhatsApp. Los mensajes no se envían realmente — todo es local.
  </div>
  <button class="reset-btn" onclick="resetChat()">Reiniciar conversación</button>
  <button class="reset-btn" style="margin-top:6px" onclick="changeRole()">Cambiar rol</button>
</div>

<div class="phone-frame">
  <!-- Status bar -->
  <div class="status-bar">
    <span id="currentTime">12:00</span>
    <span>📶 WiFi 🔋</span>
  </div>

  <!-- Header -->
  <div class="wa-header">
    <span class="back-arrow">←</span>
    <div class="avatar">G</div>
    <div class="contact-info">
      <div class="contact-name">GARYCIO Bot</div>
      <div class="contact-status" id="headerStatus">en línea</div>
    </div>
    <div class="header-icons">
      <span>📞</span>
      <span>⋮</span>
    </div>
  </div>

  <!-- Role selector overlay -->
  <div class="role-selector" id="roleSelector">
    <h3>¿Cómo querés probar el bot?</h3>
    <button class="role-btn" onclick="selectRole('donante')">
      <span class="role-icon">👩</span> Donante
    </button>
    <button class="role-btn" onclick="selectRole('chofer')">
      <span class="role-icon">🚛</span> Chofer (recolector)
    </button>
    <button class="role-btn" onclick="selectRole('peon')">
      <span class="role-icon">👷</span> Peón (acompañante del chofer)
    </button>
    <button class="role-btn" onclick="selectRole('admin')">
      <span class="role-icon">🔐</span> Administrador
    </button>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="date-separator"><span>Hoy</span></div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typingIndicator">
    <span></span><span></span><span></span>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <span class="emoji-btn">😊</span>
    <textarea class="msg-input" id="msgInput" placeholder="Mensaje" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Admin notification banner -->
<div class="notification-banner" id="notifBanner">
  <div class="notif-title">📲 Notificación Admin</div>
  <div id="notifText"></div>
</div>

<script>
// ── State ──────────────────────────────────
let currentRole = null;
let conversationState = { flow: null, step: 0, data: {} };

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// Update clock
setInterval(() => {
  document.getElementById('currentTime').textContent = getTime();
}, 30000);
document.getElementById('currentTime').textContent = getTime();

// ── Role selection ──────────────────────────
function selectRole(role) {
  currentRole = role;
  document.getElementById('roleSelector').style.display = 'none';
  document.getElementById('infoRole').textContent = role;
  document.getElementById('infoPhone').textContent =
    role === 'admin' ? '+5491126330388' :
    role === 'chofer' ? '+5491155001234' :
    role === 'peon' ? '+5491155005678' : '+393445721753';

  // Auto-start with role keyword
  if (role === 'donante') {
    addMessage('Hola', 'sent');
    setTimeout(() => processBot('hola'), 800);
  } else if (role === 'chofer') {
    addMessage('chofer', 'sent');
    setTimeout(() => processBot('chofer'), 800);
  } else if (role === 'peon') {
    addMessage('peón', 'sent');
    setTimeout(() => processBot('peón'), 800);
  } else if (role === 'admin') {
    addMessage('admin', 'sent');
    setTimeout(() => processBot('admin'), 800);
  }
}

function changeRole() {
  resetChat();
  document.getElementById('roleSelector').style.display = 'block';
}

function resetChat() {
  conversationState = { flow: null, step: 0, data: {} };
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = '<div class="date-separator"><span>Hoy</span></div>';
  document.getElementById('infoFlow').textContent = '-';
  document.getElementById('infoStep').textContent = '-';
}

// ── Message rendering ──────────────────────
function formatWhatsApp(text) {
  // Bold: *text*
  text = text.replace(/\*([^*]+)\*/g, '<b>$1</b>');
  // Italic: _text_
  text = text.replace(/_([^_]+)_/g, '<i>$1</i>');
  return text;
}

function addMessage(text, type) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `message ${type}`;

  const timeStr = getTime();
  const checkMark = type === 'sent' ? '<span class="check">✓✓</span>' : '';
  div.innerHTML = formatWhatsApp(text) + `<span class="time">${timeStr} ${checkMark}</span>`;

  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const indicator = document.getElementById('typingIndicator');
  indicator.style.display = 'block';
  document.getElementById('headerStatus').textContent = 'escribiendo...';
}

function hideTyping() {
  document.getElementById('typingIndicator').style.display = 'none';
  document.getElementById('headerStatus').textContent = 'en línea';
}

function showNotification(text) {
  const banner = document.getElementById('notifBanner');
  document.getElementById('notifText').innerHTML = formatWhatsApp(text);
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 6000);
}

// ── Send message ──────────────────────────
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'sent');
  showTyping();
  const delay = 600 + Math.random() * 800;
  setTimeout(() => {
    hideTyping();
    processBot(text);
  }, delay);
}

// ── Bot logic ──────────────────────────────
function processBot(message) {
  const msg = message.trim();
  const lower = msg.toLowerCase();
  let response = null;

  // If no active flow, detect
  if (!conversationState.flow) {
    if (['chofer', 'recolector', 'registro', 'litros'].some(k => lower.includes(k))) {
      conversationState.flow = 'chofer';
      conversationState.step = 0;
    } else if (['peon', 'peón', 'acompañante'].some(k => lower.includes(k))) {
      conversationState.flow = 'peon';
      conversationState.step = 0;
    } else if (['admin', 'administrador', 'gestión', 'gestion'].some(k => lower.includes(k))) {
      conversationState.flow = 'admin';
      conversationState.step = 0;
    } else if (['reclamo', 'queja', 'problema'].some(k => lower.includes(k))) {
      conversationState.flow = 'reclamo';
      conversationState.step = 0;
    } else {
      // Default donante greeting
      response = {
        reply: "¡Hola! 👋 Soy el asistente de GARYCIO.\n\n¿En qué te puedo ayudar?\n\n*1* - Tengo un reclamo\n*2* - Quiero dar un aviso (vacaciones/enfermedad)\n*3* - Tengo una consulta\n\nRespondé con el número o escribí directamente tu consulta.",
        nextStep: 'menu'
      };
      conversationState.flow = 'donante_menu';
      conversationState.step = 'menu';
    }
  }

  // Handle donante_menu numeric selection
  if (conversationState.flow === 'donante_menu') {
    if (lower === '1') {
      conversationState.flow = 'reclamo';
      conversationState.step = 0;
    } else if (lower === '2') {
      response = { reply: "📋 *Aviso registrado*\n\n¿Cuántos días no vas a estar disponible?\nResponde con el número de días o indicá las fechas." };
      conversationState.flow = null;
    } else if (lower === '3') {
      response = { reply: "¿Cuál es tu consulta? Te vamos a responder a la brevedad." };
      conversationState.flow = null;
    }
  }

  // If response already set (greeting), show it
  if (response && !conversationState.flow) {
    addMessage(response.reply, 'received');
    updateInfo();
    return;
  }

  if (response) {
    addMessage(response.reply, 'received');
    updateInfo();
    return;
  }

  // Route to flow handlers
  const result = handleFlow(conversationState.flow, conversationState.step, msg, lower);

  if (result.reply) {
    addMessage(result.reply, 'received');
  }

  if (result.data) {
    conversationState.data = { ...conversationState.data, ...result.data };
  }

  if (result.endFlow) {
    conversationState.flow = null;
    conversationState.step = 0;
    conversationState.data = {};
  } else if (result.nextStep !== undefined) {
    conversationState.step = result.nextStep;
  }

  if (result.notify) {
    showNotification(result.notify);
  }

  updateInfo();
}

function updateInfo() {
  document.getElementById('infoFlow').textContent = conversationState.flow || '-';
  document.getElementById('infoStep').textContent = conversationState.step ?? '-';
}

// ── Flow handlers ──────────────────────────
function handleFlow(flow, step, msg, lower) {
  switch (flow) {
    case 'chofer': return handleChofer(step, msg, lower);
    case 'peon': return handlePeon(step, msg, lower);
    case 'admin': return handleAdmin(step, msg, lower);
    case 'reclamo': return handleReclamo(step, msg, lower);
    default: return { reply: "No entendí. Escribí *hola* para empezar.", endFlow: true };
  }
}

// ── CHOFER ──────────────────────────────────
function handleChofer(step, msg, lower) {
  switch (step) {
    case 0: {
      const m = msg.match(/(\d+)/);
      if (!m) {
        return {
          reply: "🚛 *Registro de Chofer*\n\nIngresá tu *número de chofer* para identificarte.\n(ej: *1*, *2*, *CH01*, etc.)",
          nextStep: 0
        };
      }
      const code = m[1].padStart(2, '0');
      return {
        reply: `✅ Identificado como *Chofer #${code}*\n\n¿Qué querés registrar?\n\n*1* - Litros y bidones recolectados\n*2* - Carga de combustible\n*3* - Reportar incidente\n*4* - Enviar foto/comprobante 📸\n*5* - Reportar donante de baja\n*6* - Finalizar jornada\n\nRespondé con el número.`,
        nextStep: 1,
        data: { codigoChofer: code }
      };
    }
    case 1: {
      if (lower === '1') return { reply: "🥛 *Registro de recolección*\n\n¿Cuántos *litros* recolectaste en total hoy?\n(ej: *850*, *1200.5*)", nextStep: 2 };
      if (lower === '2') return { reply: "⛽ *Carga de combustible*\n\nIngresá los litros y el monto separados por coma:\n(ej: *45, 12500*)", nextStep: 10 };
      if (lower === '3') return { reply: "🚨 *Reportar Incidente*\n\n¿Qué tipo de incidente?\n\n*1* - Accidente de tránsito\n*2* - Retraso significativo\n*3* - Avería del camión\n*4* - Robo o intento de robo\n*5* - Problema climático\n*6* - Otro\n\nRespondé con el número.", nextStep: 20 };
      if (lower === '4') return { reply: "📸 *Enviar Comprobante / Foto*\n\n¿Qué tipo de comprobante querés enviar?\n\n*1* - Foto de bidones recolectados\n*2* - Ticket de combustible\n*3* - Foto de lavado de camión\n\nRespondé con el número.", nextStep: 30 };
      if (lower === '5') return { reply: "⚠️ *Reportar donante de baja*\n\nIngresá el *nombre y/o dirección* de la donante:", nextStep: 40 };
      if (lower === '6') return {
        reply: `✅ *Jornada finalizada - Chofer #${conversationState.data.codigoChofer}*\n\n¡Buen trabajo hoy! 💪 Los datos quedaron cargados.\nMañana no te olvides de cargar los litros.`,
        endFlow: true,
        notify: `📋 Chofer #${conversationState.data.codigoChofer} finalizó su jornada.`
      };
      return { reply: "No entendí. Respondé con un número:\n\n*1* - Litros y bidones\n*2* - Combustible\n*3* - Reportar incidente\n*4* - Enviar foto/comprobante 📸\n*5* - Reportar donante de baja\n*6* - Finalizar jornada", nextStep: 1 };
    }
    case 2: {
      const litros = parseFloat(msg.replace(',','.'));
      if (isNaN(litros) || litros <= 0) return { reply: "Ingresá un número válido de litros. (ej: *850*, *1200.5*)", nextStep: 2 };
      return { reply: `Registrado: *${litros} litros*.\n\n¿Cuántos *bidones* recolectaste? (ej: *17*, *25*)`, nextStep: 3, data: { litros } };
    }
    case 3: {
      const bidones = parseInt(msg, 10);
      if (isNaN(bidones) || bidones <= 0) return { reply: "Ingresá un número válido de bidones. (ej: *17*, *25*)", nextStep: 3 };
      const prom = (conversationState.data.litros / bidones).toFixed(1);
      return {
        reply: `📋 *Resumen de recolección*\n\nChofer: *#${conversationState.data.codigoChofer}*\nLitros: *${conversationState.data.litros}*\nBidones: *${bidones}*\nPromedio/bidón: *${prom} L*\n\n*1* - Confirmar | *2* - Corregir`,
        nextStep: 4, data: { bidones }
      };
    }

        reply: "Tu reclamo quedó registrado. ✅\n\nSe lo vamos a informar al recolector de tu zona. En *4 días* te vamos a escribir para saber si se resolvió.\n\n¿Hay algo más en lo que te podamos ayudar?",
        nextStep: 2,
        notify: `📋 *Nuevo reclamo*\n\nDonante: +393445721753\nTipo: ${conversationState.data.tipoReclamo}\nDetalle: ${sinDetalle ? 'Sin detalle' : msg}`
      };
    }
    case 2: {
      const yes = ['si','sí','sep'].some(a => lower.includes(a));
      if (yes) return {
        reply: "¿En qué más te podemos ayudar?\n\n*1* - Tengo otro reclamo\n*2* - Quiero dar un aviso (vacaciones/enfermedad)\n*3* - Tengo una consulta",
        endFlow: true
      };
      return { reply: "¡Perfecto! Cualquier cosa estamos por acá. ¡Buen día! 😊", endFlow: true };
    }
    default:
      return { reply: "Gracias por reportar. ¡Lo vamos a resolver!", endFlow: true };
  }
}
</script>
