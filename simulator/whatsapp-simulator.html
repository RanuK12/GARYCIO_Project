<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARYCIO WhatsApp Bot - Simulador</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b141a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone-frame {
    width: 390px;
    height: 780px;
    background: #0b141a;
    border-radius: 40px;
    border: 3px solid #2a2a2a;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
  }

  /* Status bar */
  .status-bar {
    background: #1f2c34;
    padding: 8px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #aebac1;
  }

  /* WhatsApp header */
  .wa-header {
    background: #1f2c34;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #222d34;
  }

  .wa-header .back-arrow {
    color: #00a884;
    font-size: 20px;
    cursor: pointer;
  }

  .wa-header .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #00a884;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 16px;
  }

  .wa-header .contact-info { flex: 1; }

  .wa-header .contact-name {
    color: #e9edef;
    font-size: 16px;
    font-weight: 500;
  }

  .wa-header .contact-status {
    color: #8696a0;
    font-size: 12px;
  }

  .wa-header .header-icons {
    display: flex;
    gap: 20px;
    color: #aebac1;
    font-size: 18px;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    background: #0b141a;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23111b21' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: #374045; border-radius: 4px; }

  /* Messages */
  .message {
    max-width: 85%;
    padding: 6px 8px 2px;
    border-radius: 8px;
    font-size: 14.2px;
    line-height: 1.35;
    position: relative;
    margin-bottom: 2px;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .message .time {
    font-size: 11px;
    color: #8696a0;
    float: right;
    margin-left: 8px;
    margin-top: 4px;
  }

  .message.sent {
    background: #005c4b;
    color: #e9edef;
    align-self: flex-end;
    border-top-right-radius: 0;
  }

  .message.sent .time { color: rgba(255,255,255,0.55); }

  .message.sent .check {
    color: #53bdeb;
    font-size: 13px;
    margin-left: 2px;
  }

  .message.received {
    background: #1f2c34;
    color: #e9edef;
    align-self: flex-start;
    border-top-left-radius: 0;
  }

  /* Date separator */
  .date-separator { text-align: center; margin: 8px 0; }

  .date-separator span {
    background: #182229;
    color: #8696a0;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 8px;
  }

  /* Bold/italic in messages */
  .message b { font-weight: 600; }
  .message i { font-style: italic; }

  /* Input area */
  .input-area {
    background: #1f2c34;
    padding: 8px 10px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .input-area .emoji-btn {
    color: #8696a0;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
    padding-bottom: 6px;
  }

  .input-area .msg-input {
    flex: 1;
    background: #2a3942;
    border: none;
    border-radius: 8px;
    padding: 9px 12px;
    color: #e9edef;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    min-height: 38px;
  }

  .input-area .msg-input::placeholder { color: #8696a0; }

  .input-area .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #00a884;
    border: none;
    color: #111b21;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .input-area .send-btn:hover { background: #06cf9c; }

  /* Role selector */
  .role-selector {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #182229;
    border: 1px solid #2a3942;
    border-radius: 12px;
    padding: 20px;
    z-index: 10;
    width: 340px;
    text-align: center;
  }

  .role-selector h3 {
    color: #e9edef;
    margin-bottom: 16px;
    font-size: 16px;
  }

  .role-selector .role-btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    background: #2a3942;
    border: 1px solid #374045;
    border-radius: 8px;
    color: #e9edef;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }

  .role-selector .role-btn:hover { background: #005c4b; }
  .role-selector .role-btn .role-icon { margin-right: 8px; }

  /* Typing indicator */
  .typing-indicator {
    align-self: flex-start;
    background: #1f2c34;
    border-radius: 8px;
    border-top-left-radius: 0;
    padding: 10px 14px;
    display: none;
  }

  .typing-indicator span {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #8696a0;
    margin: 0 1px;
    animation: typing 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-3px); }
  }

  /* Notification banner */
  .notification-banner {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #182229;
    border: 1px solid #005c4b;
    border-radius: 12px;
    padding: 12px 16px;
    max-width: 350px;
    color: #e9edef;
    font-size: 13px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: slideIn 0.3s ease;
    display: none;
  }

  .notification-banner .notif-title {
    color: #00a884;
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 12px;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Side panel */
  .side-info {
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: #182229;
    border: 1px solid #2a3942;
    border-radius: 12px;
    padding: 20px;
    width: 280px;
    color: #8696a0;
    font-size: 13px;
  }

  .side-info h4 {
    color: #00a884;
    margin-bottom: 12px;
    font-size: 14px;
  }

  .side-info .info-item {
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .side-info .info-label {
    color: #aebac1;
    font-weight: 500;
  }

  .side-info .reset-btn {
    margin-top: 16px;
    width: 100%;
    padding: 8px;
    background: #2a3942;
    border: 1px solid #374045;
    border-radius: 6px;
    color: #e9edef;
    cursor: pointer;
    font-size: 13px;
  }

  .side-info .reset-btn:hover { background: #374045; }

  @media (max-width: 900px) { .side-info { display: none; } }
</style>
</head>
<body>

<div class="side-info" id="sideInfo">
  <h4>GARYCIO Bot Simulator</h4>
  <div class="info-item"><span class="info-label">Rol:</span> <span id="infoRole">-</span></div>
  <div class="info-item"><span class="info-label">Flow:</span> <span id="infoFlow">-</span></div>
  <div class="info-item"><span class="info-label">Step:</span> <span id="infoStep">-</span></div>
  <div class="info-item"><span class="info-label">Teléfono:</span> <span id="infoPhone">-</span></div>
  <hr style="border-color:#2a3942;margin:12px 0">
  <div style="color:#8696a0;font-size:12px;line-height:1.5">
    Simulador local del bot de WhatsApp. Los mensajes no se envían realmente — todo es local.
  </div>
  <button class="reset-btn" onclick="resetChat()">Reiniciar conversación</button>
  <button class="reset-btn" style="margin-top:6px" onclick="changeRole()">Cambiar rol</button>
</div>

<div class="phone-frame">
  <!-- Status bar -->
  <div class="status-bar">
    <span id="currentTime">12:00</span>
    <span>📶 WiFi 🔋</span>
  </div>

  <!-- Header -->
  <div class="wa-header">
    <span class="back-arrow">←</span>
    <div class="avatar">G</div>
    <div class="contact-info">
      <div class="contact-name">GARYCIO Bot</div>
      <div class="contact-status" id="headerStatus">en línea</div>
    </div>
    <div class="header-icons">
      <span>📞</span>
      <span>⋮</span>
    </div>
  </div>

  <!-- Role selector overlay -->
  <div class="role-selector" id="roleSelector">
    <h3>¿Cómo querés probar el bot?</h3>
    <button class="role-btn" onclick="selectRole('donante')">
      <span class="role-icon">👩</span> Donante
    </button>
    <button class="role-btn" onclick="selectRole('donante_difusion')">
      <span class="role-icon">📢</span> Donante (recibió difusión)
    </button>
    <button class="role-btn" onclick="selectRole('chofer')">
      <span class="role-icon">🚛</span> Chofer (recolector)
    </button>
    <button class="role-btn" onclick="selectRole('peon')">
      <span class="role-icon">👷</span> Peón (acompañante del chofer)
    </button>
    <button class="role-btn" onclick="selectRole('visitadora')">
      <span class="role-icon">👩‍⚕️</span> Visitadora
    </button>
    <button class="role-btn" onclick="selectRole('admin')">
      <span class="role-icon">🔐</span> Administrador
    </button>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="date-separator"><span>Hoy</span></div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typingIndicator">
    <span></span><span></span><span></span>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <span class="emoji-btn">😊</span>
    <textarea class="msg-input" id="msgInput" placeholder="Mensaje" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Admin notification banner -->
<div class="notification-banner" id="notifBanner">
  <div class="notif-title">📲 Notificación enviada</div>
  <div id="notifText"></div>
</div>

<script>
// ── State ──────────────────────────────────
let currentRole = null;
let conversationState = { flow: null, step: 0, data: {} };

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

setInterval(() => { document.getElementById('currentTime').textContent = getTime(); }, 30000);
document.getElementById('currentTime').textContent = getTime();

// ── Role selection ──────────────────────────
function selectRole(role) {
  currentRole = role;
  document.getElementById('roleSelector').style.display = 'none';

  const phones = {
    admin: '+5491126330388',
    chofer: '+5491155001234',
    peon: '+5491155005678',
    visitadora: '+5491155009000',
    donante: '+5491155779900',
    donante_difusion: '+5491155779900',
  };
  document.getElementById('infoRole').textContent = role;
  document.getElementById('infoPhone').textContent = phones[role] || '+5491155779900';

  if (role === 'donante') {
    addMessage('Hola', 'sent');
    setTimeout(() => processBot('hola'), 800);
  } else if (role === 'donante_difusion') {
    // Simulamos que el bot ya mandó un mensaje de difusión con ruta OptimoRoute
    conversationState.flow = 'difusion';
    conversationState.step = 0;
    conversationState.data = { diasAsignados: 'Lunes y Jueves', chofer: 2 };
    addMessage('Buen día *María*. Le hablamos de parte del laboratorio para informarle que sus días de recolección son: *Lunes y Jueves*, y le corresponde el *Camión #2*.\n\nEl horario estimado de paso es alrededor de las *07:45 hs*.\n\nConfirme recepción apretando el número *1*.\nDe lo contrario, si tiene alguna otra consulta oprima *2*.', 'received');
    document.getElementById('infoFlow').textContent = 'difusion';
    document.getElementById('infoStep').textContent = '0';
  } else if (role === 'chofer') {
    addMessage('chofer', 'sent');
    setTimeout(() => processBot('chofer'), 800);
  } else if (role === 'peon') {
    addMessage('peón', 'sent');
    setTimeout(() => processBot('peón'), 800);
  } else if (role === 'visitadora') {
    addMessage('visitadora', 'sent');
    setTimeout(() => processBot('visitadora'), 800);
  } else if (role === 'admin') {
    addMessage('admin', 'sent');
    setTimeout(() => processBot('admin'), 800);
  }
}

function changeRole() {
  resetChat();
  document.getElementById('roleSelector').style.display = 'block';
}

function resetChat() {
  conversationState = { flow: null, step: 0, data: {} };
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = '<div class="date-separator"><span>Hoy</span></div>';
  document.getElementById('infoFlow').textContent = '-';
  document.getElementById('infoStep').textContent = '-';
}

// ── Message rendering ──────────────────────
function formatWhatsApp(text) {
  text = text.replace(/\*([^*]+)\*/g, '<b>$1</b>');
  text = text.replace(/_([^_]+)_/g, '<i>$1</i>');
  return text;
}

function addMessage(text, type) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `message ${type}`;
  const timeStr = getTime();
  const checkMark = type === 'sent' ? '<span class="check">✓✓</span>' : '';
  div.innerHTML = formatWhatsApp(text) + `<span class="time">${timeStr} ${checkMark}</span>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const indicator = document.getElementById('typingIndicator');
  indicator.style.display = 'block';
  document.getElementById('headerStatus').textContent = 'escribiendo...';
}

function hideTyping() {
  document.getElementById('typingIndicator').style.display = 'none';
  document.getElementById('headerStatus').textContent = 'en línea';
}

function showNotification(target, text) {
  const banner = document.getElementById('notifBanner');
  const title = banner.querySelector('.notif-title');
  const icons = { admin: '📲 Admin notificado', chofer: '🚛 Chofer notificado', ceo: '🔴 CEO notificado' };
  title.textContent = icons[target] || '📲 Notificación enviada';
  document.getElementById('notifText').innerHTML = formatWhatsApp(text);
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 6000);
}

// ── Send message ──────────────────────────
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'sent');
  showTyping();
  const delay = 600 + Math.random() * 800;
  setTimeout(() => {
    hideTyping();
    processBot(text);
  }, delay);
}

// ── Bot logic ──────────────────────────────
function processBot(message) {
  const msg = message.trim();
  const lower = msg.toLowerCase();
  const lowerNorm = lower.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  // ── Global escape: "hablar con persona" ──────────
  if (!conversationState.flow || ['donante_menu', 'reclamo', 'aviso', 'consulta', 'difusion'].includes(conversationState.flow)) {
    const FRASES_PERSONA = [
      "hablar con una persona", "hablar con alguien", "quiero hablar con",
      "persona real", "operador", "humano", "atencion humana",
      "comunicarme con alguien"
    ];
    if (FRASES_PERSONA.some(f => lowerNorm.includes(f))) {
      showNotification('admin', `🤝 *Atención personalizada requerida*\n\n💬 Mensaje: "${msg}"\n\n⚠️ La donante quiere hablar con una persona.`);
      addMessage("✅ Te vamos a derivar con una persona de nuestro equipo.\n\nEn breve alguien se va a comunicar con vos. ¡Gracias por tu paciencia! 😊", 'received');
      conversationState = { flow: null, step: 0, data: {} };
      updateInfo();
      return;
    }

    // ── Intención de baja ──────────────────────────
    const FRASES_BAJA = [
      "me quiero bajar", "quiero darme de baja", "quiero dejar de donar",
      "ya no quiero donar", "no quiero donar mas", "no voy a donar mas",
      "deme de baja", "dame de baja", "quiero salir", "quiero cancelar",
      "no quiero participar", "dejen de venir", "no pasen mas",
      "no pasen por mi casa", "ya no participo"
    ];
    if (FRASES_BAJA.some(f => lowerNorm.includes(f))) {
      showNotification('admin', `🚨 *ATENCIÓN PERSONALIZADA REQUERIDA*\n\n💬 Mensaje: "${msg}"\n📋 Motivo: Intención de baja\n\n⚠️ Requiere contacto manual a la brevedad.`);
      addMessage("Lamentamos que quieras dejar de participar. 💙\n\nTu mensaje fue recibido y una persona de nuestro equipo se va a comunicar con vos a la brevedad para acompañarte.\n\nSi en algún momento querés retomar, siempre vas a poder escribirnos. ¡Gracias por haber donado!", 'received');
      conversationState = { flow: null, step: 0, data: {} };
      updateInfo();
      return;
    }
  }

  // ── If no active flow, detect ──────────────────
  if (!conversationState.flow) {
    if (['chofer', 'recolector', 'registro', 'litros'].some(k => lower.includes(k))) {
      conversationState.flow = 'chofer';
      conversationState.step = 0;
    } else if (['peon', 'peón', 'acompañante'].some(k => lowerNorm.includes(k))) {
      conversationState.flow = 'peon';
      conversationState.step = 0;
    } else if (['visitadora', 'visita'].some(k => lower.includes(k))) {
      conversationState.flow = 'visitadora';
      conversationState.step = 0;
    } else if (['admin', 'administrador', 'gestion', 'gestión'].some(k => lowerNorm.includes(k))) {
      conversationState.flow = 'admin';
      conversationState.step = 0;
    } else if (['reclamo', 'queja', 'problema'].some(k => lower.includes(k))) {
      conversationState.flow = 'reclamo';
      conversationState.step = 0;
    } else if (['aviso', 'vacaciones', 'ausencia', 'enfermedad', 'medicacion', 'medicación'].some(k => lowerNorm.includes(k))) {
      conversationState.flow = 'aviso';
      conversationState.step = 0;
    } else {
      // Default donante greeting → show main menu
      addMessage(
        "¡Hola! 👋 Soy el asistente de GARYCIO.\n\n¿En qué te puedo ayudar?\n\n*1* - Tengo un reclamo\n*2* - Quiero dar un aviso\n*3* - Tengo una consulta\n*4* - Hablar con una persona\n\nRespondé con el número o escribí directamente tu consulta.",
        'received'
      );
      conversationState.flow = 'donante_menu';
      conversationState.step = 0;
      updateInfo();
      return;
    }
  }

  // ── Handle donante_menu numeric selection ──────
  if (conversationState.flow === 'donante_menu') {
    if (lower === '1' || lower.includes('reclamo')) {
      conversationState.flow = 'reclamo';
      conversationState.step = 0;
    } else if (lower === '2' || lower.includes('aviso')) {
      conversationState.flow = 'aviso';
      conversationState.step = 0;
    } else if (lower === '3' || lower.includes('consulta')) {
      conversationState.flow = 'consulta';
      conversationState.step = 0;
    } else if (lower === '4') {
      showNotification('admin', `🤝 *Atención personalizada*\n\n📱 Donante solicitó hablar con una persona desde el menú principal.`);
      addMessage("Te vamos a derivar con una persona de nuestro equipo. En breve se van a comunicar con vos. 😊", 'received');
      conversationState = { flow: null, step: 0, data: {} };
      updateInfo();
      return;
    } else {
      addMessage("¿En qué te puedo ayudar?\n\n*1* - Tengo un reclamo\n*2* - Quiero dar un aviso\n*3* - Tengo una consulta\n*4* - Hablar con una persona", 'received');
      updateInfo();
      return;
    }
  }

  // Route to flow handlers
  const result = handleFlow(conversationState.flow, conversationState.step, msg, lower);

  if (result.reply) {
    addMessage(result.reply, 'received');
  }

  if (result.data) {
    conversationState.data = { ...conversationState.data, ...result.data };
  }

  if (result.endFlow) {
    conversationState.flow = null;
    conversationState.step = 0;
    conversationState.data = {};
  } else if (result.nextStep !== undefined) {
    conversationState.step = result.nextStep;
  }

  if (result.notify) {
    showNotification(result.notify.target || 'admin', result.notify.message || result.notify);
  }

  updateInfo();
}

function updateInfo() {
  document.getElementById('infoFlow').textContent = conversationState.flow || '-';
  document.getElementById('infoStep').textContent = conversationState.step ?? '-';
}

// ── Flow dispatcher ──────────────────────────
function handleFlow(flow, step, msg, lower) {
  switch (flow) {
    case 'difusion':    return handleDifusion(step, msg, lower);
    case 'reclamo':     return handleReclamo(step, msg, lower);
    case 'aviso':       return handleAviso(step, msg, lower);
    case 'consulta':    return handleConsulta(step, msg, lower);
    case 'chofer':      return handleChofer(step, msg, lower);
    case 'peon':        return handlePeon(step, msg, lower);
    case 'visitadora':  return handleVisitadora(step, msg, lower);
    case 'admin':       return handleAdmin(step, msg, lower);
    default: return { reply: "No entendí. Escribí *hola* para empezar.", endFlow: true };
  }
}

// ════════════════════════════════════════════
// ── DIFUSIÓN ────────────────────────────────
// ════════════════════════════════════════════
function handleDifusion(step, msg, lower) {
  switch (step) {
    case 0: {
      if (msg === '1') {
        return {
          reply: "¡Gracias por confirmar! 😊\n\nSi necesitás algo más podés escribirnos cuando quieras.",
          endFlow: true,
          notify: { target: 'admin', message: `✅ Donante confirmó recepción del mensaje de difusión.` }
        };
      }
      if (msg === '2') {
        return {
          reply: "¡Hola! 👋 ¿En qué te puedo ayudar?\n\n*1* - Tengo un reclamo\n*2* - Quiero dar un aviso\n*3* - Tengo una consulta\n*4* - Hablar con una persona",
          endFlow: true
        };
      }
      return {
        reply: "Respondé:\n*1* - Confirmado, gracias\n*2* - Ver menú de opciones",
        nextStep: 0
      };
    }
    default:
      return { reply: "Escribí *hola* para ver el menú.", endFlow: true };
  }
}

// ════════════════════════════════════════════
// ── RECLAMO (donante) ────────────────────────
// ════════════════════════════════════════════
/*
 * step 0 - Menú tipo de reclamo
 *   1 → falta_bidon_vacio → step 2
 *   2 → no_pasaron → step 2
 *   3 → bidon_sucio → step 3 (directo, notifica admin)
 *   4 → pelela → step 3 (directo, notifica chofer)
 *   5 → regalo → step 1 (sub-menú)
 *   0 → endFlow
 * step 1 - Sub-menú regalo
 *   1 → falta → step 2
 *   2 → roto  → step 2
 * step 2 - Detalle opcional → step 3
 * step 3 - Confirmación final
 */
const MENU_RECLAMO =
  "¿Qué tipo de reclamo querés hacer?\n\n" +
  "*1* - No me dejaron bidón vacío\n" +
  "*2* - No pasaron hoy a retirar el bidón\n" +
  "*3* - Bidón sucio\n" +
  "*4* - Necesito pelela\n" +
  "*5* - Regalo\n" +
  "*0* - Volver al menú principal\n\n" +
  "Respondé con el número correspondiente.";

function handleReclamo(step, msg, lower) {
  switch (step) {
    case 0: {
      if (lower === '0' || lower.includes('volver') || lower.includes('menu principal')) {
        return { reply: "Volviste al menú principal. Escribí cualquier cosa para ver las opciones.", endFlow: true };
      }
      if (lower === '1') {
        return {
          reply: "Registramos tu reclamo: *no te dejaron bidón vacío*.\n\n¿Querés agregar algún detalle? Si no, respondé *no*.",
          nextStep: 2, data: { tipoReclamo: 'falta_bidon_vacio', labelReclamo: 'No dejaron bidón vacío' }
        };
      }
      if (lower === '2') {
        return {
          reply: "Registramos tu reclamo: *no pasaron hoy a retirar el bidón*.\n\n¿Querés agregar algún detalle? Si no, respondé *no*.",
          nextStep: 2, data: { tipoReclamo: 'no_pasaron', labelReclamo: 'No pasaron a retirar' }
        };
      }
      if (lower === '3') {
        return {
          reply: "Tomamos nota de tu reclamo por *bidón sucio*. 🧹\n\nEstamos trabajando para mejorar nuestro servicio de limpieza de bidones. Tu comentario nos ayuda a mejorar.\n\nElevaremos un reclamo, pronto solucionaremos tu situación.\n\n¿Hay algo más en lo que te podamos ayudar?\n*1* - Sí\n*2* - No, gracias",
          nextStep: 3, data: { tipoReclamo: 'bidon_sucio' },
          notify: { target: 'admin', message: `📋 *Reclamo: Bidón sucio*\n\nDonante solicitó reclamo por bidón sucio.\n\n_Reclamo automático_` }
        };
      }
      if (lower === '4') {
        return {
          reply: "Tomamos nota de tu pedido de *pelela*. 🪣\n\nNos vamos a comunicar con los recolectores para que te lleven una pelela en la próxima visita.\n\n¿Hay algo más en lo que te podamos ayudar?\n*1* - Sí\n*2* - No, gracias",
          nextStep: 3, data: { tipoReclamo: 'pelela' },
          notify: { target: 'chofer', message: `🪣 *Pedido de pelela*\n\nUna donante solicitó una pelela. Llevar en la próxima visita.` }
        };
      }
      if (lower === '5') {
        return {
          reply: "¿Qué pasó con el regalo?\n\n*1* - Falta el regalo (no me lo dejaron)\n*2* - El regalo está roto\n\nRespondé con el número.",
          nextStep: 1, data: { tipoReclamo: 'regalo' }
        };
      }
      return { reply: MENU_RECLAMO, nextStep: 0 };
    }
    case 1: {
      if (lower === '1') {
        return {
          reply: "Registramos tu reclamo: *falta el regalo*.\n\n¿Cuál es el regalo que te falta? (describilo brevemente o escribí *no sé*)",
          nextStep: 2, data: { subTipoRegalo: 'falta', labelReclamo: 'Falta regalo' }
        };
      }
      if (lower === '2') {
        return {
          reply: "Registramos tu reclamo: *regalo roto*.\n\n¿Querés agregar algún detalle de qué está roto? Si no, respondé *no*.",
          nextStep: 2, data: { subTipoRegalo: 'roto', labelReclamo: 'Regalo roto' }
        };
      }
      return {
        reply: "Opción no válida. ¿Qué pasó con el regalo?\n\n*1* - Falta el regalo\n*2* - El regalo está roto",
        nextStep: 1
      };
    }
    case 2: {
      const sinDetalle = ['no','nop','na','nada','no se','no sé'].some(n => lower === n);
      const label = conversationState.data.labelReclamo || 'general';
      return {
        reply: `Tu reclamo por *${label}* quedó registrado. ✅\n\nElevaremos un reclamo, pronto solucionaremos tu situación.\n\nSe lo vamos a informar al recolector de tu zona. En *4 días* te vamos a escribir para saber si se resolvió.\n\n¿Hay algo más en lo que te podamos ayudar?\n*1* - Sí\n*2* - No, gracias`,
        nextStep: 3,
        data: { detalleReclamo: sinDetalle ? null : msg },
        notify: { target: 'chofer', message: `📋 *Nuevo reclamo*\n\nTipo: ${label}\nDetalle: ${sinDetalle ? 'Sin detalle' : msg}\n\nPor favor resolvelo en los próximos días.` }
      };
    }
    case 3: {
      const esAfirmativo = ['si','sí','sep','sip','1'].some(a => lower === a || lower.startsWith(a + ' '));
      if (esAfirmativo) {
        return {
          reply: "¿En qué más te podemos ayudar?\n\n*1* - Tengo otro reclamo\n*2* - Quiero dar un aviso\n*3* - Otro motivo",
          endFlow: true
        };
      }
      if (msg.trim().length >= 8 && !['no','nop','na','nah','gracias','2'].some(n => lower === n)) {
        return {
          reply: "Anotamos tu consulta y te respondemos a la brevedad. 📩\n\nUna persona de nuestro equipo va a revisar tu mensaje y te va a contestar personalmente.\n\n¡Buen día! 😊",
          endFlow: true,
          notify: { target: 'admin', message: `📩 *Consulta post-reclamo*\n\n💬 Mensaje: "${msg}"\n\n⚠️ Requiere respuesta manual.` }
        };
      }
      return { reply: "¡Perfecto! Cualquier cosa estamos por acá. ¡Buen día! 😊", endFlow: true };
    }
    default:
      return { reply: "Gracias por reportar. ¡Lo vamos a resolver!", endFlow: true };
  }
}

// ════════════════════════════════════════════
// ── AVISO (donante) ──────────────────────────
// ════════════════════════════════════════════
/*
 * step 0 - Menú tipo de aviso
 *   1 → vacaciones → step 1
 *   2 → enfermedad → step 1
 *   3 → cambio_direccion → step 2
 *   4 → cambio_telefono → step 3
 *   0 → endFlow
 * step 1 - Fecha de vuelta (vacaciones/enfermedad) → endFlow
 * step 2 - Cambio de dirección → endFlow
 * step 3 - Cambio de teléfono → endFlow
 */
const MENU_AVISO =
  "¿Por qué motivo nos querés avisar?\n\n" +
  "*1* - Me voy de vacaciones 🏖️\n" +
  "*2* - Aviso por enfermedad 🤒\n" +
  "*3* - Cambio de dirección 📍\n" +
  "*4* - Cambio de teléfono 📱\n" +
  "*0* - Volver al menú principal\n\n" +
  "Respondé con el número correspondiente.";

function handleAviso(step, msg, lower) {
  switch (step) {
    case 0: {
      if (lower === '0' || lower.includes('volver')) {
        return { reply: "Volviste al menú principal. Escribí cualquier cosa para ver las opciones.", endFlow: true };
      }
      if (lower === '1') {
        return {
          reply: "Registramos tu aviso por: *ausencia por motivo personal* 🏖️\n\n¿Cuándo calculás que volvés?\n\nPodés escribir:\n• Una fecha: *15/04*, *el lunes*, *en 2 semanas*\n• Cantidad de días: *3 días*, *una semana*\n• Si no sabés: *no sé*",
          nextStep: 1, data: { tipoAviso: 'vacaciones' }
        };
      }
      if (lower === '2') {
        return {
          reply: "Lamentamos que no te sientas bien. 🤒\n\n¿Cuándo querés que te volvamos a visitar?\n\nPodés escribir:\n• Una fecha: *15/04*, *el lunes*\n• Cantidad de días: *3 días*, *una semana*\n• Si no sabés: *no sé*",
          nextStep: 1, data: { tipoAviso: 'enfermedad' }
        };
      }
      if (lower === '3') {
        return {
          reply: "📍 *Cambio de dirección*\n\nEscribí tu *nueva dirección completa* (calle, número, entre calles, barrio):",
          nextStep: 2, data: { tipoAviso: 'cambio_direccion' }
        };
      }
      if (lower === '4') {
        return {
          reply: "📱 *Cambio de teléfono*\n\nEscribí tu *nuevo número de teléfono*:",
          nextStep: 3, data: { tipoAviso: 'cambio_telefono' }
        };
      }
      return { reply: MENU_AVISO, nextStep: 0 };
    }
    case 1: {
      // Fecha de vuelta
      const lowerNorm = lower.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      const noSabe = ['no s', 'no se', 'ni idea', 'no tengo'].some(n => lowerNorm.includes(n));
      let fechaTexto = null;
      if (!noSabe) {
        const m = msg.match(/(\d{1,2})[\/\-](\d{1,2})/);
        if (m) fechaTexto = `${m[1].padStart(2,'0')}/${m[2].padStart(2,'0')}`;
        if (!fechaTexto) {
          const md = lower.match(/(\d+)\s*d[ií]a/);
          if (md) {
            const d = new Date(); d.setDate(d.getDate() + parseInt(md[1]));
            fechaTexto = d.toLocaleDateString('es-AR');
          }
        }
        if (!fechaTexto) {
          const ms = lower.match(/(\d+|una?)\s*semana/);
          if (ms) {
            const n = isNaN(parseInt(ms[1])) ? 1 : parseInt(ms[1]);
            const d = new Date(); d.setDate(d.getDate() + n * 7);
            fechaTexto = d.toLocaleDateString('es-AR');
          }
        }
        if (!fechaTexto) {
          const diasNombres = { lunes:1, martes:2, miercoles:3, jueves:4, viernes:5, sabado:6, domingo:0 };
          const lN = lower.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          for (const [nombre, num] of Object.entries(diasNombres)) {
            if (lN.includes(nombre)) {
              const hoy = new Date();
              let diff = num - hoy.getDay();
              if (diff <= 0) diff += 7;
              hoy.setDate(hoy.getDate() + diff);
              fechaTexto = hoy.toLocaleDateString('es-AR');
              break;
            }
          }
        }
      }
      const mensajeVuelta = fechaTexto
        ? `Te esperamos de vuelta el *${fechaTexto}*. Ese día le vamos a avisar a tu recolector para que retome el paso.`
        : "Cuando sepas cuándo vas a estar disponible, avisanos por acá y lo coordinamos con el recolector.";
      const tipo = conversationState.data.tipoAviso || 'general';
      const tipMsg = tipo === 'enfermedad' ? '¡Que te mejores pronto! 💪' : tipo === 'vacaciones' ? '¡Que disfrutes! 🌞' : '¡Hasta pronto!';
      return {
        reply: `¡Listo! Tu aviso quedó registrado. 📝\n\n${mensajeVuelta}\n\n${tipMsg}`,
        endFlow: true,
        data: { fechaVuelta: fechaTexto },
        notify: { target: 'chofer', message: `📢 *Aviso de donante*\n\nMotivo: ${tipo}\nVuelta estimada: ${fechaTexto || "Sin fecha definida"}\n\n⚠️ No pasar a recolectar hasta nuevo aviso.` }
      };
    }
    case 2: {
      // Cambio de dirección
      if (msg.length < 5) {
        return { reply: "Necesitamos una dirección más completa. Por favor escribila con calle y número:", nextStep: 2 };
      }
      return {
        reply: `✅ *Dirección actualizada*\n\n📍 Nueva dirección: *${msg}*\n\nLe vamos a avisar al recolector de tu zona sobre el cambio. ¡Gracias!`,
        endFlow: true,
        data: { nuevaDireccion: msg },
        notify: { target: 'admin', message: `📍 *Cambio de dirección*\n\nDonante cambió su dirección a: ${msg}\n\nActualizar en el sistema y avisar al chofer.` }
      };
    }
    case 3: {
      // Cambio de teléfono
      const cleaned = msg.replace(/[\s\-(). ]/g, '');
      if (cleaned.length < 8 || !/\d{8,}/.test(cleaned)) {
        return { reply: "No parece un número de teléfono válido. Ingresá un número con al menos 8 dígitos:", nextStep: 3 };
      }
      return {
        reply: `✅ *Teléfono actualizado*\n\n📱 Nuevo teléfono: *${msg}*\n\nLo actualizamos en el sistema. ¡Gracias!`,
        endFlow: true,
        data: { nuevoTelefono: msg },
        notify: { target: 'admin', message: `📱 *Cambio de teléfono*\n\nNuevo teléfono: ${msg}\n\nActualizar en el sistema.` }
      };
    }
    default:
      return { reply: "¡Registrado! Te deseamos lo mejor.", endFlow: true };
  }
}

// ════════════════════════════════════════════
// ── CONSULTA (donante) ───────────────────────
// ════════════════════════════════════════════
function handleConsulta(step, msg, lower) {
  const FAQ = {
    '1': { titulo: 'Días de recolección', respuesta: 'Los días de recolección dependen de tu zona. Si hubo cambios, tu recolector te va a avisar.\n\nSi no recibiste aviso, escribinos diciendo *reclamo*.' },
    '2': { titulo: 'Regalos y beneficios', respuesta: 'Los regalos se entregan una vez al mes durante la recolección.\nSi no te lo dejaron, escribinos diciendo *reclamo* → regalo.' },
    '3': { titulo: 'Cambio de dirección', respuesta: 'Escribinos tu *nueva dirección completa* y la actualizamos.\nAvisale también a tu recolector cuando pase.' },
    '4': { titulo: 'Dejar de donar', respuesta: 'Lamentamos que quieras dejar de donar. Si es temporal, avisanos como *aviso*.\n\nUn encargado se va a comunicar con vos.' },
  };

  switch (step) {
    case 0: {
      const faq = FAQ[msg.trim()];
      if (faq) {
        return {
          reply: `📌 *${faq.titulo}*\n\n${faq.respuesta}\n\n¿Te puedo ayudar en algo más? Respondé *sí* o *no*.`,
          nextStep: 1, data: { consultaTipo: faq.titulo }
        };
      }
      if (msg.trim().length >= 8 && !['1','2','3','4'].includes(msg.trim())) {
        return {
          reply: "Anotamos tu consulta y te respondemos a la brevedad. 📩\n\nUna persona de nuestro equipo va a revisar tu mensaje y te va a contestar personalmente.\n\n¿Hay algo más en lo que te podamos ayudar?\n*1* - Sí\n*2* - No, gracias",
          nextStep: 1,
          notify: { target: 'admin', message: `📩 *Consulta libre*\n\n💬 Mensaje: "${msg}"\n\n⚠️ Requiere respuesta manual.` }
        };
      }
      return {
        reply: "¿Sobre qué querés consultar?\n\n*1* - Días de recolección\n*2* - Regalos y beneficios\n*3* - Cambio de dirección\n*4* - Dejar de donar\n\nRespondé con el número o escribí tu consulta directamente.",
        nextStep: 0
      };
    }
    case 1: {
      const quiereMas = ['si', 'sí', '1'].some(a => lower === a || lower.startsWith(a + ' '));
      if (quiereMas) {
        return {
          reply: "¿Sobre qué querés consultar?\n\n*1* - Días de recolección\n*2* - Regalos y beneficios\n*3* - Cambio de dirección\n*4* - Dejar de donar",
          nextStep: 0
        };
      }
      if (msg.trim().length > 3 && !['no','nop','2'].some(n => lower === n)) {
        return {
          reply: "Anotamos tu consulta y te respondemos a la brevedad. 📩\n\n¿Hay algo más?\n*1* - Sí, tengo otra cosa\n*2* - No, gracias",
          endFlow: true,
          notify: { target: 'admin', message: `📩 *Consulta adicional*\n\n💬 Mensaje: "${msg}"\n\n⚠️ Requiere respuesta manual.` }
        };
      }
      return { reply: "¡Perfecto! Cualquier cosa estamos por acá. ¡Buen día! 😊", endFlow: true };
    }
    default:
      return { reply: "¡Cualquier cosa estamos por acá!", endFlow: true };
  }
}

// ════════════════════════════════════════════
// ── CHOFER ───────────────────────────────────
// ════════════════════════════════════════════
/*
 * step 0  - Identificación
 * step 1  - Menú principal (1=bidones, 2=combustible, 3=incidente, 4=baja, 5=regalos, 0=salir)
 * step 2  - Bidones: ingresar cantidad
 * step 3  - Confirmar bidones
 * step 4  - Foto bidones (omitir / foto)
 * step 10 - Combustible: litros, monto
 * step 11 - Confirmar combustible
 * step 12 - Foto combustible
 * step 20 - Tipo incidente (1-5)
 * step 21 - Detalle incidente
 * step 22 - Gravedad
 * step 30 - Baja: nombre/dirección donante
 * step 31 - Baja: motivo
 * step 32 - Baja: confirmar
 * step 50 - Regalos: vehículo (1=camión, 2=peón1, 3=peón2, 4=peón3)
 * step 51 - Regalos: nombre del peón
 * step 52 - Regalos: sub-tipo (1=Entregados, 2=Faltantes, 3=Sobrantes, 4=Cambios)
 * step 53 - Regalos: cantidad
 * step 54 - Regalos: ¿registrar más?
 * step 99 - Volver al menú o finalizar
 */

const MENU_CHOFER =
  "*1* - Bidones recolectados\n" +
  "*2* - Carga de combustible\n" +
  "*3* - Reportar incidente\n" +
  "*4* - Reportar donante de baja\n" +
  "*5* - Regalos 🎁\n" +
  "*0* - Volver al menú principal";

const OPCIONES_99_CHOFER =
  "*1* - Sí, seguir registrando\n" +
  "*0* - Volver al menú principal";

function handleChofer(step, msg, lower) {
  switch (step) {
    case 0: {
      const m = msg.match(/(\d+)/);
      if (!m) {
        return { reply: "🚛 *Registro de Chofer*\n\nIngresá tu *número de chofer* para identificarte.\n(ej: *1*, *2*, *CH01*, etc.)", nextStep: 0 };
      }
      const code = m[1].padStart(2, '0');
      return {
        reply: `✅ Identificado como *Chofer #${code}*\n\n¿Qué querés registrar?\n\n${MENU_CHOFER}\n\nRespondé con el número.`,
        nextStep: 1, data: { codigoChofer: code }
      };
    }
    case 1: {
      if (lower === '0' || lower.includes('volver')) return { reply: "Saliste del registro de chofer. Escribí cualquier cosa para volver al menú principal.", endFlow: true };
      if (lower === '1' || lower.includes('bidon')) return { reply: "🛢️ *Registro de recolección*\n\n¿Cuántos *bidones* recolectaste hoy?\n(ej: *17*, *25*)", nextStep: 2 };
      if (lower === '2' || lower.includes('combustible')) return { reply: "⛽ *Carga de combustible*\n\nIngresá los litros y el monto separados por coma:\n(ej: *45, 12500*)", nextStep: 10 };
      if (lower === '3' || lower.includes('incidente')) {
        return {
          reply: "🚨 *Reportar Incidente*\n\n¿Qué tipo de incidente?\n\n*1* - Accidente en el tránsito\n*2* - Retraso significativo\n*3* - Avería del camión\n*4* - Intento de robo o robo\n*5* - Otro\n\nRespondé con el número.",
          nextStep: 20
        };
      }
      if (lower === '4' || lower.includes('baja')) {
        return {
          reply: "⚠️ *Reportar donante de baja*\n\nIngresá el *nombre, dirección y motivo* de la donante:\n(podés escribirlo todo junto o primero el nombre)",
          nextStep: 30
        };
      }
      if (lower === '5' || lower.includes('regalo')) {
        return {
          reply: "🎁 *Regalos*\n\n¿Para quién es el registro?\n\n*1* - Camión\n*2* - Peón 1\n*3* - Peón 2\n*4* - Peón 3\n\nRespondé con el número.",
          nextStep: 50
        };
      }
      return { reply: `No entendí. Respondé con un número:\n\n${MENU_CHOFER}`, nextStep: 1 };
    }
    case 2: {
      const bidones = parseInt(msg, 10);
      if (isNaN(bidones) || bidones <= 0) return { reply: "Ingresá un número válido de bidones. (ej: *17*, *25*)", nextStep: 2 };
      return {
        reply: `📋 *Resumen de recolección*\n\nChofer: *#${conversationState.data.codigoChofer}*\nBidones: *${bidones}*\n\n*1* - Confirmar | *2* - Corregir`,
        nextStep: 3, data: { bidones }
      };
    }
    case 3: {
      if (!['1','si','sí','ok','dale'].some(a => lower.includes(a))) {
        return { reply: "¿Cuántos *bidones* recolectaste? Empecemos de nuevo.", nextStep: 2, data: { bidones: undefined } };
      }
      return {
        reply: "✅ *Bidones registrados*\n\nAhora enviá una *foto* de los bidones recolectados. 📸\n\nSi no tenés foto, escribí *omitir*.",
        nextStep: 4, data: { recoleccionGuardada: true },
        notify: { target: 'admin', message: `🛢️ *Recolección registrada*\n\nChofer: #${conversationState.data.codigoChofer}\nBidones: ${conversationState.data.bidones}` }
      };
    }
    case 4: {
      if (lower.includes('omitir') || lower.includes('no tengo')) {
        return { reply: `Foto omitida. ¿Querés registrar algo más?\n\n${OPCIONES_99_CHOFER}`, nextStep: 99 };
      }
      return { reply: `📸 En este simulador no se pueden enviar fotos, pero en WhatsApp real funcionaría. ¿Querés registrar algo más?\n\n${OPCIONES_99_CHOFER}`, nextStep: 99 };
    }
    case 10: {
      const parts = msg.split(/[,;]/);
      if (parts.length < 2) return { reply: "Formato: *litros, monto* (ej: *45, 12500*)", nextStep: 10 };
      const l = parseFloat(parts[0].trim().replace(',','.'));
      const m2 = parseFloat(parts[1].trim().replace(',','.'));
      if (isNaN(l) || isNaN(m2)) return { reply: "Datos no válidos. Formato: *litros, monto* (ej: *45, 12500*)", nextStep: 10 };
      return {
        reply: `⛽ *Carga de combustible*\n\nLitros: *${l}*\nMonto: *$${m2.toLocaleString('es-AR')}*\n\n*1* - Confirmar | *2* - Corregir`,
        nextStep: 11, data: { litrosComb: l, montoComb: m2 }
      };
    }
    case 11: {
      if (!['1','si','sí'].some(a => lower.includes(a))) return { reply: "Ingresá de nuevo: *litros, monto*", nextStep: 10 };
      return {
        reply: "✅ *Combustible registrado*\n\nAhora enviá una *foto* del ticket de combustible. 📸\n\nSi no tenés foto, escribí *omitir*.",
        nextStep: 12,
        notify: { target: 'admin', message: `⛽ *Combustible registrado*\nChofer: #${conversationState.data.codigoChofer}\nLitros: ${conversationState.data.litrosComb}\nMonto: $${conversationState.data.montoComb}` }
      };
    }
    case 12: {
      if (lower.includes('omitir') || lower.includes('no tengo')) {
        return { reply: `Foto omitida. ¿Querés registrar algo más?\n\n${OPCIONES_99_CHOFER}`, nextStep: 99 };
      }
      return { reply: `📸 En este simulador no se pueden enviar fotos, pero en WhatsApp real funcionaría. ¿Querés registrar algo más?\n\n${OPCIONES_99_CHOFER}`, nextStep: 99 };
    }
    case 20: {
      const tiposInc = { '1': 'Accidente en el tránsito', '2': 'Retraso significativo', '3': 'Avería del camión', '4': 'Intento de robo o robo', '5': 'Otro' };
      const t = tiposInc[msg.trim()];
      if (!t) return { reply: "Respondé con el número del tipo de incidente (1-5):", nextStep: 20 };
      let pregunta = "Describí brevemente qué pasó:";
      if (msg === '2') pregunta = "¿De cuánto tiempo es la demora estimada?";
      else if (msg === '3') pregunta = "¿Qué avería tiene el camión? Describilo brevemente:";
      else if (msg === '4') pregunta = "¿Qué pasó y dónde fue? Contanos brevemente:";
      return { reply: `Tipo: *${t}*\n\n${pregunta}`, nextStep: 21, data: { tipoIncidente: t } };
    }
    case 21: {
      if (msg.length < 3) return { reply: "Necesitamos más detalle. ¿Qué pasó?", nextStep: 21 };
      return {
        reply: "¿Qué tan grave es la situación?\n\n*1* - Baja (informativo, no afecta la operación)\n*2* - Media (afecta parcialmente el recorrido)\n*3* - Alta (no se puede continuar el recorrido)\n*4* - Crítica (emergencia, se necesita asistencia)",
        nextStep: 22, data: { descripcionIncidente: msg }
      };
    }
    case 22: {
      const gravs = { '1': 'baja', '2': 'media', '3': 'alta', '4': 'critica' };
      const emojis = { baja: '🟢', media: '🟡', alta: '🟠', critica: '🔴' };
      const g = gravs[msg.trim()] || 'media';
      const e = emojis[g];
      return {
        reply: `${e} *Incidente registrado*\n\nSe notificó a la dirección de forma inmediata.\nTipo: *${conversationState.data.tipoIncidente}*\nGravedad: *${g}*\n\n¿Necesitás registrar algo más?\n\n${OPCIONES_99_CHOFER}`,
        nextStep: 99,
        notify: { target: 'admin', message: `${e} *INCIDENTE REPORTADO*\n\nChofer: *#${conversationState.data.codigoChofer}*\nTipo: *${conversationState.data.tipoIncidente}*\nGravedad: *${g.toUpperCase()}*\nDescripción: ${conversationState.data.descripcionIncidente}` }
      };
    }
    case 30: {
      if (msg.length < 3) return { reply: "Ingresá el nombre y/o dirección de la donante:", nextStep: 30 };
      return {
        reply: `⚠️ Donante: *${msg}*\n\n¿Cuál es el motivo de la baja?\n\n*1* - No dona más\n*2* - Se mudó\n*3* - Falleció\n*4* - Dona muy poco\n*5* - Otro motivo\n\nElegí una opción:`,
        nextStep: 31, data: { bajaDonante: msg }
      };
    }
    case 31: {
      const motivos = { '1': 'No dona más', '2': 'Se mudó', '3': 'Falleció', '4': 'Dona muy poco', '5': 'Otro' };
      const m3 = motivos[msg];
      if (!m3) return { reply: "Opción no válida. Elegí del *1* al *5*:", nextStep: 31 };
      return {
        reply: `📋 *Confirmar reporte de baja*\n\n📍 Donante: ${conversationState.data.bajaDonante}\n📝 Motivo: ${m3}\n\n⚠️ Se notificará a los administradores y *se contactará automáticamente a la donante* para confirmar la situación.\n\n*1* - Confirmar\n*2* - Cancelar`,
        nextStep: 32, data: { bajaMotivo: m3 }
      };
    }
    case 32: {
      if (msg === '2') return { reply: `Cancelado. ¿Querés registrar algo más?\n\n${OPCIONES_99_CHOFER}`, nextStep: 99 };
      if (msg !== '1') return { reply: "Elegí *1* (confirmar) o *2* (cancelar):", nextStep: 32 };
      return {
        reply: `✅ *Reporte de baja enviado*\n\nSe notificó a los administradores y se contactará a la donante automáticamente para confirmar la situación.\n\n¿Querés registrar algo más?\n${OPCIONES_99_CHOFER}`,
        nextStep: 99,
        notify: { target: 'admin', message: `🔴 *Reporte de baja de donante*\n\n📍 Donante: ${conversationState.data.bajaDonante}\n📝 Motivo: ${conversationState.data.bajaMotivo}\n🚛 Reportado por: Chofer #${conversationState.data.codigoChofer}\n\n⚠️ El bot contactará automáticamente a la donante para preguntar qué sucedió.` }
      };
    }
    case 50: {
      const vehiculos = { '1': 'Camión', '2': 'Peón 1', '3': 'Peón 2', '4': 'Peón 3' };
      const v = vehiculos[msg.trim()];
      if (!v) {
        return {
          reply: "Opción no válida. ¿Para quién es el registro?\n\n*1* - Camión\n*2* - Peón 1\n*3* - Peón 2\n*4* - Peón 3",
          nextStep: 50
        };
      }
      const esPeon = msg.trim() !== '1';
      if (esPeon) {
        return {
          reply: `Registrando regalos para *${v}*.\n\n¿Cuál es el *nombre* del peón?`,
          nextStep: 51, data: { regalosVehiculo: v, regalosEsPeon: true }
        };
      }
      return {
        reply: `Registrando regalos para *${v}*.\n\n¿Qué querés registrar?\n\n*1* - Entregados\n*2* - Faltantes\n*3* - Sobrantes\n*4* - Cambios\n\nRespondé con el número.`,
        nextStep: 52, data: { regalosVehiculo: v, regalosEsPeon: false, regalosNombrePeon: null }
      };
    }
    case 51: {
      if (msg.length < 2) return { reply: "Ingresá el nombre del peón:", nextStep: 51 };
      return {
        reply: `Peón: *${msg}*\n\n¿Qué querés registrar?\n\n*1* - Entregados\n*2* - Faltantes\n*3* - Sobrantes\n*4* - Cambios\n\nRespondé con el número.`,
        nextStep: 52, data: { regalosNombrePeon: msg }
      };
    }
    case 52: {
      const subtipos = { '1': 'Entregados', '2': 'Faltantes', '3': 'Sobrantes', '4': 'Cambios' };
      const s = subtipos[msg.trim()];
      if (!s) {
        return { reply: "Opción no válida.\n\n*1* - Entregados\n*2* - Faltantes\n*3* - Sobrantes\n*4* - Cambios", nextStep: 52 };
      }
      return { reply: `¿Cuántos regalos *${s.toLowerCase()}*?`, nextStep: 53, data: { regalosSubTipo: s } };
    }
    case 53: {
      const cantidad = parseInt(msg, 10);
      if (isNaN(cantidad) || cantidad < 0) return { reply: "Ingresá un número válido (ej: *5*, *0*):", nextStep: 53 };
      const vehiculo = conversationState.data.regalosVehiculo || '?';
      const nombre = conversationState.data.regalosNombrePeon || null;
      const subtipo = conversationState.data.regalosSubTipo || '?';
      const registro = { vehiculo, nombre, subtipo, cantidad };
      const listaActual = [...(conversationState.data.regalosLista || []), registro];
      const resumen = listaActual.map(r => `  • ${r.vehiculo}${r.nombre ? ` (${r.nombre})` : ""}: ${r.cantidad} ${r.subtipo.toLowerCase()}`).join('\n');
      return {
        reply: `✅ Registrado: *${vehiculo}*${nombre ? ` (${nombre})` : ""} → *${cantidad} ${subtipo.toLowerCase()}*\n\n📋 *Resumen actual:*\n${resumen}\n\n¿Querés registrar más regalos?\n\n*1* - Sí, registrar otro\n*2* - No, confirmar y guardar`,
        nextStep: 54,
        data: { regalosLista: listaActual }
      };
    }
    case 54: {
      if (msg === '1') {
        return {
          reply: "🎁 ¿Para quién es el registro?\n\n*1* - Camión\n*2* - Peón 1\n*3* - Peón 2\n*4* - Peón 3\n\nRespondé con el número.",
          nextStep: 50
        };
      }
      const lista = conversationState.data.regalosLista || [];
      const total = lista.reduce((s, r) => s + r.cantidad, 0);
      const resumenAdmin = lista.map(r => `  ${r.vehiculo}${r.nombre ? ` (${r.nombre})` : ""}: ${r.cantidad} ${r.subtipo.toLowerCase()}`).join('\n');
      return {
        reply: `✅ *Regalos registrados*\n\n📦 Total registros: *${lista.length}*\n\n¿Querés registrar algo más?\n\n${OPCIONES_99_CHOFER}`,
        nextStep: 99,
        data: { regalosGuardados: true },
        notify: { target: 'admin', message: `🎁 *Regalos registrados por Chofer #${conversationState.data.codigoChofer}*\n\n${resumenAdmin}\n\n📦 Total: ${total}` }
      };
    }
    case 99: {
      if (msg === '1') return { reply: `¿Qué querés registrar?\n\n${MENU_CHOFER}\n\nRespondé con el número.`, nextStep: 1 };
      if (msg === '0') return { reply: "Saliste del registro de chofer. Escribí cualquier cosa para volver al menú principal.", endFlow: true };
      return {
        reply: "No entendí. Respondé con:\n\n*1* - Sí, seguir registrando\n*0* - Volver al menú principal",
        nextStep: 99
      };
    }
    default:
      return { reply: "Sesión finalizada. Escribí *chofer* para volver al menú.", endFlow: true };
  }
}

// ════════════════════════════════════════════
// ── PEÓN ─────────────────────────────────────
// ════════════════════════════════════════════
function handlePeon(step, msg, lower) {
  const MENU_PEON =
    "*1* - Reportar reclamo de donante\n" +
    "*2* - Marcar entrega de regalo 🎁\n" +
    "*3* - Reportar donante de baja\n" +
    "*4* - Enviar foto/comprobante 📸\n" +
    "*5* - Finalizar\n" +
    "*0* - Volver al menú principal";
  const OPCIONES_99 = "*1* - Sí, seguir registrando\n*2* - Finalizar jornada\n*0* - Volver al menú principal";

  switch (step) {
    case 0: {
      const m = msg.match(/(\d+)/);
      if (!m) return { reply: "👷 *Registro de Peón*\n\nIngresá tu *número de peón* para identificarte.\n(ej: *1*, *2*, *P01*, etc.)", nextStep: 0 };
      const code = m[1].padStart(2, '0');
      return { reply: `✅ Identificado como *Peón #${code}*\n\n¿Qué querés hacer?\n\n${MENU_PEON}\n\nElegí una opción:`, nextStep: 1, data: { codigoPeon: code } };
    }
    case 1: {
      if (msg === '1') return { reply: "📋 *Reclamo de donante*\n\nIngresá la *dirección o nombre* de la donante:", nextStep: 10 };
      if (msg === '2') return { reply: "🎁 *Entrega de regalo*\n\nIngresá la *dirección o nombre* de la donante:", nextStep: 20 };
      if (msg === '3') return { reply: "⚠️ *Reportar donante de baja*\n\nIngresá el *nombre y/o dirección* de la donante:", nextStep: 30 };
      if (msg === '4') return { reply: "📸 *Enviar comprobante*\n\n¿Qué tipo de comprobante?\n\n*1* - Foto de recolección\n*2* - Combustible\n*3* - Lavado de camión\n\nElegí una opción:", nextStep: 40 };
      if (msg === '5') return { reply: "📦 *Cierre de jornada*\n\n¿Cuántos regalos tenías al *inicio* del día?\n(ej: *30*)", nextStep: 60 };
      if (msg === '0') return { reply: "👋 Volviendo al menú principal...", endFlow: true };
      return { reply: "Opción no válida. Elegí *1*, *2*, *3*, *4*, *5* o *0*:", nextStep: 1 };
    }
    case 10: {
      if (msg.length < 3) return { reply: "Ingresá la dirección o nombre de la donante:", nextStep: 10 };
      return {
        reply: `📍 Donante: *${msg}*\n\n¿Qué tipo de reclamo?\n\n*1* - No le dejaron regalo\n*2* - Falta bidón\n*3* - Nueva pelela\n*4* - Otro\n\nElegí una opción:`,
        nextStep: 11, data: { reclamoDonante: msg }
      };
    }
    case 11: {
      const tipos = { '1': 'regalo', '2': 'falta_bidon', '3': 'nueva_pelela', '4': 'otro' };
      const t = tipos[msg];
      if (!t) return { reply: "Opción no válida. Elegí *1*, *2*, *3* o *4*:", nextStep: 11 };
      return { reply: "Describí brevemente el reclamo (o escribí *-* si no hay más detalle):", nextStep: 12, data: { reclamoTipo: t } };
    }
    case 12: {
      const desc = msg === '-' ? 'Sin detalle' : msg;
      return {
        reply: `✅ *Reclamo registrado*\n\n📍 Donante: ${conversationState.data.reclamoDonante}\n📋 Tipo: ${conversationState.data.reclamoTipo}\n📝 Detalle: ${desc}\n\nSe notificará a los administradores.\n\n¿Querés hacer algo más?\n${OPCIONES_99}`,
        nextStep: 99,
        notify: { target: 'admin', message: `⚠️ *Reclamo reportado por peón #${conversationState.data.codigoPeon}*\n\n📍 Donante: ${conversationState.data.reclamoDonante}\n📋 Tipo: ${conversationState.data.reclamoTipo}\n📝 Detalle: ${desc}` }
      };
    }
    case 20: {
      if (msg.length < 3) return { reply: "Ingresá la dirección o nombre de la donante:", nextStep: 20 };
      return { reply: `🎁 Donante: *${msg}*\n\n¿Confirmás que se entregó el regalo?\n\n*1* - Sí, entregado\n*2* - No, cancelar`, nextStep: 21, data: { regaloDonante: msg } };
    }
    case 21: {
      if (msg === '2') return { reply: `Cancelado. ¿Querés hacer algo más?\n${OPCIONES_99}`, nextStep: 99 };
      if (msg !== '1') return { reply: "Elegí *1* (sí) o *2* (no):", nextStep: 21 };
      return { reply: `✅ *Regalo entregado* a ${conversationState.data.regaloDonante}\n\n¿Querés registrar otro?\n${OPCIONES_99}`, nextStep: 99 };
    }
    case 30: {
      if (msg.length < 3) return { reply: "Ingresá el nombre y/o dirección de la donante:", nextStep: 30 };
      return {
        reply: `⚠️ Donante: *${msg}*\n\n¿Cuál es el motivo de la baja?\n\n*1* - No dona más\n*2* - Se mudó\n*3* - Falleció\n*4* - Dona muy poco\n*5* - Otro motivo\n\nElegí una opción:`,
        nextStep: 31, data: { bajaDonante: msg }
      };
    }
    case 31: {
      const motivos = { '1': 'No dona más', '2': 'Se mudó', '3': 'Falleció', '4': 'Dona muy poco', '5': 'Otro' };
      const m4 = motivos[msg];
      if (!m4) return { reply: "Opción no válida. Elegí del *1* al *5*:", nextStep: 31 };
      return {
        reply: `📋 *Confirmar reporte de baja*\n\n📍 Donante: ${conversationState.data.bajaDonante}\n📝 Motivo: ${m4}\n\n⚠️ *No se dará de baja automáticamente.* Se notificará a los administradores para que contacten a la donante.\n\n*1* - Confirmar\n*2* - Cancelar`,
        nextStep: 32, data: { bajaMotivo: m4 }
      };
    }
    case 32: {
      if (msg === '2') return { reply: `Cancelado. ¿Querés hacer algo más?\n${OPCIONES_99}`, nextStep: 99 };
      if (msg !== '1') return { reply: "Elegí *1* (confirmar) o *2* (cancelar):", nextStep: 32 };
      return {
        reply: `✅ *Reporte de baja enviado a los administradores*\n\nEllos van a contactar a la donante para confirmar.\n\n¿Querés hacer algo más?\n${OPCIONES_99}`,
        nextStep: 99,
        notify: { target: 'admin', message: `🔴 *Reporte de baja de donante*\n\n📍 Donante: ${conversationState.data.bajaDonante}\n📝 Motivo: ${conversationState.data.bajaMotivo}\n👷 Reportado por: Peón #${conversationState.data.codigoPeon}` }
      };
    }
    case 40: {
      const tipos = { '1': 'Foto de recolección', '2': 'Combustible', '3': 'Lavado de camión' };
      const t2 = tipos[msg];
      if (!t2) return { reply: "Opción no válida. Elegí *1*, *2* o *3*:", nextStep: 40 };
      return { reply: "📸 Enviá la foto del comprobante:", nextStep: 41 };
    }
    case 41: {
      return { reply: `📸 En este simulador no se pueden enviar fotos, pero en WhatsApp real funcionaría.\n\n¿Querés hacer algo más?\n${OPCIONES_99}`, nextStep: 99 };
    }
    case 60: {
      const n = parseInt(msg, 10);
      if (isNaN(n) || n < 0) return { reply: "Ingresá un número válido (ej: *30*, *0*):", nextStep: 60 };
      return { reply: `Tenías *${n} regalos* al inicio.\n\n¿Cuántos regalos te *sobraron* (no entregaste)?\n(ej: *5*, *0* si entregaste todos)`, nextStep: 61, data: { regalosAlInicio: n } };
    }
    case 61: {
      const sobraron = parseInt(msg, 10);
      if (isNaN(sobraron) || sobraron < 0) return { reply: "Ingresá un número válido (ej: *5*, *0*):", nextStep: 61 };
      const inicio = conversationState.data.regalosAlInicio || 0;
      if (sobraron > inicio) return { reply: `No puede sobrar más de lo que tenías (${inicio}). ¿Cuántos sobraron?`, nextStep: 61 };
      const entregados = inicio - sobraron;
      return {
        reply: `📦 *Resumen de regalos - Peón #${conversationState.data.codigoPeon}*\n\n• Regalos al inicio: *${inicio}*\n• Regalos entregados: *${entregados}*\n• Regalos sobrantes: *${sobraron}*\n\n*1* - Confirmar y cerrar | *2* - Corregir`,
        nextStep: 62, data: { regalosEntregados: entregados, regalsobrantes: sobraron }
      };
    }
    case 62: {
      if (msg === '2') return { reply: "¿Cuántos regalos tenías al inicio del día?", nextStep: 60, data: { regalosAlInicio: undefined } };
      const inicio = conversationState.data.regalosAlInicio || 0;
      const entregados = conversationState.data.regalosEntregados || 0;
      const sobraron = conversationState.data.regalsobrantes || 0;
      return {
        reply: `✅ *Jornada cerrada - Peón #${conversationState.data.codigoPeon}*\n\n📦 Regalos: ${entregados} entregados, ${sobraron} sobrantes.\n\n¡Buen trabajo hoy! 💪`,
        endFlow: true,
        notify: { target: 'admin', message: `📦 *Cierre de jornada - Peón #${conversationState.data.codigoPeon}*\n\nRegalos al inicio: ${inicio}\nRegalos entregados: ${entregados}\nRegalos sobrantes: ${sobraron}` }
      };
    }
    case 99: {
      if (msg === '1') return { reply: `¿Qué querés hacer?\n\n${MENU_PEON}\n\nElegí una opción:`, nextStep: 1 };
      if (msg === '0') return { reply: "👋 Volviendo al menú principal...", endFlow: true };
      return { reply: "✅ ¡Jornada registrada! Buen trabajo. 💪", endFlow: true };
    }
    default:
      return { reply: "Sesión finalizada. Escribí *peón* para volver al menú.", endFlow: true };
  }
}

// ── VISITADORA ───────────────────────────────
// ════════════════════════════════════════════
/*
 * step 0  - Identificación (nombre)
 * step 1  - Menú (1=nueva donante, 0=salir)
 * step 10 - Nueva donante: nombre y apellido
 * step 11 - Nueva donante: dirección
 * step 12 - Nueva donante: teléfono
 * step 13 - Nueva donante: confirmar
 * step 99 - Volver o finalizar
 */
const MENU_VISITADORA = "*1* - Cargar nueva donante\n*0* - Volver al menú principal";

function handleVisitadora(step, msg, lower) {
  switch (step) {
    case 0: {
      if (msg.length < 2) {
        return { reply: "👩‍⚕️ *Registro de Visitadora*\n\nIngresá tu *nombre* para identificarte:", nextStep: 0 };
      }
      return {
        reply: `✅ Identificada como *${msg}*\n\n¿Qué querés hacer?\n\n${MENU_VISITADORA}\n\nElegí una opción:`,
        nextStep: 1, data: { nombreVisitadora: msg }
      };
    }
    case 1: {
      if (lower === '0' || lower.includes('volver')) {
        return { reply: "Saliste del registro de visitadora. Escribí cualquier cosa para volver al menú principal.", endFlow: true };
      }
      if (lower === '1') {
        return { reply: "📋 *Cargar nueva donante*\n\nIngresá el *nombre y apellido* de la nueva donante:", nextStep: 10 };
      }
      return { reply: "Opción no válida. Elegí *1* o *0*:", nextStep: 1 };
    }
    case 10: {
      if (msg.length < 3) return { reply: "Ingresá el nombre y apellido completo:", nextStep: 10 };
      return {
        reply: `Donante: *${msg}*\n\nIngresá la *dirección completa* (calle, número, barrio):`,
        nextStep: 11, data: { nuevaDonNombre: msg }
      };
    }
    case 11: {
      if (msg.length < 5) return { reply: "Necesitamos una dirección más completa (calle y número):", nextStep: 11 };
      return {
        reply: `📍 Dirección: *${msg}*\n\nIngresá el *número de teléfono* de la donante (o escribí *no tiene*):`,
        nextStep: 12, data: { nuevaDonDireccion: msg }
      };
    }
    case 12: {
      const noTiene = ['no tiene', 'no', 'na', '-'].some(n => lower === n);
      const telefono = noTiene ? null : msg;
      return {
        reply: `📋 *Confirmar nueva donante*\n\n👤 Nombre: ${conversationState.data.nuevaDonNombre}\n📍 Dirección: ${conversationState.data.nuevaDonDireccion}\n📱 Teléfono: ${telefono || "No tiene"}\n\n*1* - Confirmar | *2* - Cancelar`,
        nextStep: 13, data: { nuevaDonTelefono: telefono }
      };
    }
    case 13: {
      if (msg === '2') return { reply: "Cancelado. ¿Querés hacer algo más?\n*1* - Sí\n*2* - No, finalizar", nextStep: 99 };
      if (msg !== '1') return { reply: "Elegí *1* (confirmar) o *2* (cancelar):", nextStep: 13 };
      return {
        reply: `✅ *Nueva donante registrada*\n\n👤 ${conversationState.data.nuevaDonNombre}\n📍 ${conversationState.data.nuevaDonDireccion}\n\nSe notificó a los administradores.\n\n¿Querés cargar otra donante?\n*1* - Sí\n*2* - No, finalizar`,
        nextStep: 99, data: { donanteRegistrada: true },
        notify: { target: 'admin', message: `📋 *Nueva donante cargada por visitadora*\n\n👩‍⚕️ Visitadora: ${conversationState.data.nombreVisitadora}\n👤 Nombre: ${conversationState.data.nuevaDonNombre}\n📍 Dirección: ${conversationState.data.nuevaDonDireccion}\n📱 Teléfono: ${conversationState.data.nuevaDonTelefono || "No tiene"}` }
      };
    }
    case 99: {
      if (msg === '1') return { reply: `¿Qué querés hacer?\n\n${MENU_VISITADORA}`, nextStep: 1 };
      return { reply: "✅ Sesión finalizada. ¡Buen trabajo! 💪", endFlow: true };
    }
    default:
      return { reply: "Sesión finalizada. Escribí *visitadora* para volver al menú.", endFlow: true };
  }
}
